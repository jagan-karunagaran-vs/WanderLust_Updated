<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – WanderLust</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

    <!-- Background blobs -->
    <div class="auth-bg">
        <div class="auth-blob auth-blob--1"></div>
        <div class="auth-blob auth-blob--2"></div>
        <div class="auth-blob auth-blob--3"></div>
    </div>

    <div class="auth-wrapper">
        <!-- Left branding panel -->
        <div class="auth-brand">
            <a href="index.html" class="auth-logo">WanderLust</a>
            <h2 class="auth-brand__headline">Welcome back, explorer.</h2>
            <p class="auth-brand__sub">Your next adventure is just one sign-in away.</p>
            <div class="auth-brand__pills">
                <span class="pill">🗺️ Plan Trips</span>
                <span class="pill">💬 Get Support</span>
                <span class="pill">🎒 My Bookings</span>
            </div>
        </div>

        <!-- Right form panel -->
        <div class="auth-card">
            <div class="auth-card__header">
                <h1 class="auth-card__title">Sign In</h1>
                <p class="auth-card__sub">Enter your credentials to continue</p>
            </div>

            <form id="signinForm" class="auth-form" novalidate>

                <!-- Email -->
                <div class="auth-field" id="field-si-email">
                    <label class="auth-label" for="si-email">Email Address</label>
                    <div class="auth-input-wrap">
                        <span class="auth-input-icon">✉️</span>
                        <input
                            class="auth-input"
                            type="email"
                            id="si-email"
                            name="si-email"
                            placeholder="you@example.com"
                            autocomplete="email"
                        >
                    </div>
                    <span class="auth-error" id="err-si-email"></span>
                </div>

                <!-- Password -->
                <div class="auth-field" id="field-si-password">
                    <label class="auth-label" for="si-password">Password</label>
                    <div class="auth-input-wrap">
                        <span class="auth-input-icon">🔒</span>
                        <input
                            class="auth-input auth-input--pw"
                            type="password"
                            id="si-password"
                            name="si-password"
                            placeholder="Your password"
                            autocomplete="current-password"
                        >
                        <button type="button" class="auth-toggle-pw" data-target="si-password" aria-label="Toggle password">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                    <span class="auth-error" id="err-si-password"></span>
                </div>

                <!-- Global error (wrong credentials) -->
                <div class="auth-global-error" id="si-global-error" role="alert" aria-live="polite"></div>

                <!-- Submit -->
                <button type="submit" class="auth-btn" id="signinBtn">
                    <span class="auth-btn__text">Sign In</span>
                    <span class="auth-btn__loader" aria-hidden="true"></span>
                </button>

            </form>

            <p class="auth-switch">
                Don't have an account?
                <a href="signup.html" class="auth-switch__link">Sign Up</a>
            </p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
